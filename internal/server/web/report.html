<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disk Space Analyser</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #242836;
    --border: #2a2e3a;
    --text: #e1e4ed;
    --text-dim: #8b8fa3;
    --accent: #6c8cff;
    --accent-dim: rgba(108,140,255,0.12);
    --red: #ff6b6b;
    --orange: #ffa64d;
    --yellow: #ffd93d;
    --green: #6bcb77;
    --radius: 8px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }
  header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header span { font-size: 13px; color: var(--text-dim); }
  main { max-width: 960px; margin: 0 auto; padding: 24px 32px 64px; }

  /* Summary section */
  #summary h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .summary-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }
  .summary-item {
    display: grid;
    grid-template-columns: 32px 1fr 100px;
    align-items: center;
    padding: 8px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.15s;
  }
  .summary-item:hover { background: var(--surface-hover); }
  .summary-rank { font-size: 13px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
  .summary-path { font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .summary-size { font-size: 14px; text-align: right; font-variant-numeric: tabular-nums; font-weight: 500; }

  /* Size bar colors */
  .size-bar { display: inline-block; height: 4px; border-radius: 2px; margin-right: 8px; vertical-align: middle; }

  /* Tree section */
  #tree { margin-top: 32px; }
  #tree h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .tree-header {
    display: grid;
    grid-template-columns: 1fr 100px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .tree-node { display: flex; flex-direction: column; }
  .tree-row {
    display: grid;
    grid-template-columns: 20px 1fr 100px;
    align-items: center;
    padding: 5px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.15s;
    font-size: 14px;
  }
  .tree-row:hover { background: var(--surface-hover); }
  .tree-toggle {
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--text-dim);
    transition: transform 0.15s;
  }
  .tree-toggle.open { transform: rotate(90deg); }
  .tree-toggle.leaf { visibility: hidden; }
  .tree-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tree-name .shallow-tag {
    font-size: 11px;
    background: var(--accent-dim);
    color: var(--accent);
    padding: 1px 6px;
    border-radius: 4px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .tree-size { text-align: right; font-variant-numeric: tabular-nums; color: var(--text-dim); }
  .tree-children { margin-left: 20px; }
  .tree-children.hidden { display: none; }
  .tree-loading { padding: 4px 12px; font-size: 13px; color: var(--text-dim); }
  .tree-path-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: var(--surface);
    border-radius: var(--radius);
    margin-bottom: 12px;
    font-size: 14px;
    min-height: 40px;
  }
  .tree-path-bar .crumb {
    color: var(--accent);
    cursor: pointer;
  }
  .tree-path-bar .crumb:hover { text-decoration: underline; }
  .tree-path-bar .sep { color: var(--text-dim); }

  /* Responsive */
  @media (max-width: 640px) {
    header, main { padding-left: 16px; padding-right: 16px; }
    .summary-item { grid-template-columns: 28px 1fr 80px; }
    .tree-row { grid-template-columns: 20px 1fr 80px; }
  }
</style>
</head>
<body>
<header>
  <h1>Disk Space Analyser</h1>
  <span id="scan-info"></span>
</header>
<main>
  <section id="summary">
    <h2>Largest Directories</h2>
    <ol class="summary-list" id="summary-list"></ol>
  </section>
  <section id="tree">
    <h2>Directory Tree</h2>
    <div class="tree-path-bar" id="tree-breadcrumb"></div>
    <div class="tree-header"><span>Directory</span><span style="text-align:right">Size</span></div>
    <div id="tree-root"></div>
  </section>
</main>

<script>
const API_SUMMARY = '/api/summary?top=20';
const API_TREE = '/api/tree';

async function api(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

function sizeColor(bytes, maxBytes) {
  const ratio = maxBytes > 0 ? bytes / maxBytes : 0;
  if (ratio > 0.7) return 'var(--red)';
  if (ratio > 0.4) return 'var(--orange)';
  if (ratio > 0.15) return 'var(--yellow)';
  return 'var(--green)';
}

function sizeBar(bytes, maxBytes) {
  const ratio = maxBytes > 0 ? Math.max(bytes / maxBytes, 0.02) : 0;
  const color = sizeColor(bytes, maxBytes);
  return `<span class="size-bar" style="width:${ratio * 60}px;background:${color}"></span>`;
}

// --- Summary ---
async function loadSummary() {
  const dirs = await api(API_SUMMARY);
  if (!dirs.length) return;
  const maxSize = dirs[0].size;
  const list = document.getElementById('summary-list');
  list.innerHTML = dirs.map((d, i) => `
    <li class="summary-item" data-path="${escHtml(d.path)}">
      <span class="summary-rank">${i + 1}</span>
      <span class="summary-path">${sizeBar(d.size, maxSize)}${escHtml(d.path)}</span>
      <span class="summary-size" style="color:${sizeColor(d.size, maxSize)}">${escHtml(d.size_formatted)}</span>
    </li>
  `).join('');
  list.querySelectorAll('.summary-item').forEach(el => {
    el.addEventListener('click', () => navigateTo(el.dataset.path));
  });
}

// --- Tree ---
let currentPath = '/';

async function loadChildren(path) {
  const url = `${API_TREE}?path=${encodeURIComponent(path)}&limit=500`;
  return api(url);
}

function renderBreadcrumb(path) {
  const parts = path.split('/').filter(Boolean);
  let html = '<span class="crumb" data-path="/">/</span>';
  let accumulated = '';
  for (const part of parts) {
    accumulated += '/' + part;
    html += `<span class="sep">/</span><span class="crumb" data-path="${escHtml(accumulated)}">${escHtml(part)}</span>`;
  }
  const bar = document.getElementById('tree-breadcrumb');
  bar.innerHTML = html;
  bar.querySelectorAll('.crumb').forEach(el => {
    el.addEventListener('click', () => navigateTo(el.dataset.path));
  });
}

function renderTreeNodes(entries, container, parentMaxSize) {
  const maxSize = entries.length > 0 ? entries[0].size : 0;
  container.innerHTML = '';
  for (const entry of entries) {
    const node = document.createElement('div');
    node.className = 'tree-node';

    const isLeaf = entry.shallow;
    const row = document.createElement('div');
    row.className = 'tree-row';
    row.innerHTML = `
      <span class="tree-toggle ${isLeaf ? 'leaf' : ''}">&#9654;</span>
      <span class="tree-name">${escHtml(entry.name)}${isLeaf ? '<span class="shallow-tag">shallow</span>' : ''}</span>
      <span class="tree-size" style="color:${sizeColor(entry.size, parentMaxSize || maxSize)}">${escHtml(entry.size_formatted)}</span>
    `;

    const childrenDiv = document.createElement('div');
    childrenDiv.className = 'tree-children hidden';

    if (!isLeaf) {
      let loaded = false;
      row.addEventListener('click', async () => {
        const toggle = row.querySelector('.tree-toggle');
        if (!loaded) {
          toggle.classList.add('open');
          childrenDiv.classList.remove('hidden');
          childrenDiv.innerHTML = '<div class="tree-loading">Loading...</div>';
          try {
            const children = await loadChildren(entry.path);
            if (children.length === 0) {
              childrenDiv.innerHTML = '<div class="tree-loading" style="font-style:italic">Empty</div>';
              toggle.classList.add('leaf');
            } else {
              renderTreeNodes(children, childrenDiv, maxSize);
            }
          } catch (e) {
            childrenDiv.innerHTML = `<div class="tree-loading" style="color:var(--red)">Error: ${escHtml(e.message)}</div>`;
          }
          loaded = true;
        } else {
          const open = toggle.classList.toggle('open');
          childrenDiv.classList.toggle('hidden', !open);
        }
      });
    }

    node.appendChild(row);
    node.appendChild(childrenDiv);
    container.appendChild(node);
  }
}

async function navigateTo(path) {
  currentPath = path;
  renderBreadcrumb(path);
  const container = document.getElementById('tree-root');
  container.innerHTML = '<div class="tree-loading">Loading...</div>';
  try {
    const entries = await loadChildren(path);
    renderTreeNodes(entries, container, entries.length > 0 ? entries[0].size : 0);
  } catch (e) {
    container.innerHTML = `<div class="tree-loading" style="color:var(--red)">Error: ${escHtml(e.message)}</div>`;
  }
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- Init ---
loadSummary();
navigateTo('/');
</script>
</body>
</html>
